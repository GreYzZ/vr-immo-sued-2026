<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 00 – neubau.marketing</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Roboto', sans-serif;
    background: #2c313c !important;
    color: #ffffff;
  }

  .slide-wrap {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background: #2c313c;
    overflow: hidden;
    z-index: 0;
  }

  /* ── BACKGROUND — langsam pulsierend ── */
  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80vw 70vh at 80% -15%, rgba(91,143,241,0.10) 0%, transparent 55%),
      radial-gradient(ellipse 50vw 50vh at -10% 95%, rgba(91,143,241,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40vw 40vh at 50% 50%, rgba(91,143,241,0.03) 0%, transparent 70%);
    pointer-events: none;
    animation: bgpulse 6s ease-in-out infinite;
  }

  @keyframes bgpulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.6; }
  }

  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── CENTER CONTENT ── */
  .center {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4vh;
  }

  /* ── LOGO ── */
  .logo-wrap {
    position: relative;
    animation: logofadein 1.5s ease forwards;
  }

  @keyframes logofadein {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-wrap img {
    width: clamp(200px, 20vw, 320px);
    height: auto;
    display: block;
  }

  /* ── DIVIDER ── */
  .divider {
    width: clamp(40px, 4vw, 60px);
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(91,143,241,0.6), transparent);
    animation: dividerexpand 1.5s ease 0.5s both;
  }

  @keyframes dividerexpand {
    from { width: 0; opacity: 0; }
    to   { width: clamp(40px, 4vw, 60px); opacity: 1; }
  }

  /* ── EVENT INFO ── */
  .event-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2vh;
    animation: infofadein 1.5s ease 0.8s both;
  }

  @keyframes infofadein {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .event-name {
    font-size: clamp(13px, 1.2vw, 20px);
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
  }

  .event-date {
    font-size: clamp(11px, 0.9vw, 15px);
    font-weight: 300;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }

  /* ── ANIMATED DOTS ── */
  .dots {
    display: flex;
    gap: 0.8vw;
    align-items: center;
    animation: infofadein 1.5s ease 1.2s both;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(91,143,241,0.4);
    animation: dotpulse 2.4s ease-in-out infinite;
  }

  .dot:nth-child(1) { animation-delay: 0s; }
  .dot:nth-child(2) { animation-delay: 0.4s; }
  .dot:nth-child(3) { animation-delay: 0.8s; }

  @keyframes dotpulse {
    0%, 100% { background: rgba(91,143,241,0.2); transform: scale(0.8); }
    50%       { background: #5b8ff1; transform: scale(1.3); box-shadow: 0 0 8px rgba(91,143,241,0.6); }
  }

  /* ── FOOTER ── */
  .footer {
    position: absolute;
    bottom: 2.5vh;
    left: 4.5vw;
    right: 4.5vw;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: rgba(255,255,255,0.08);
  }

  .footer-text {
    font-size: clamp(10px, 0.78vw, 13px);
    font-weight: 500;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.08em;
    padding-top: 1.5vh;
  }
</style>
</head>
<body>

<div class="slide-wrap">
  <div class="bg"></div>

  <div class="center">
    <div class="logo-wrap">
      <img
        src="https://ik.imagekit.io/ViewRStudio/Neobau%20Digital%20GmbH/Grafik/Logo/1.png"
        alt="neubau.marketing"
      />
    </div>

    <div class="divider"></div>

    <div class="event-info">
      <div class="event-name">VR-Immo S&uuml;d &middot; Generalversammlung 2026</div>
      <div class="event-date">Neu-Ulm &middot; April 2026</div>
    </div>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-text">Neobau Digital GmbH &middot; neubau.marketing</div>
    <div class="footer-text">Vertraulich &middot; VR-Immo S&uuml;d 2026</div>
  </div>

</div>

</body>
</html>
